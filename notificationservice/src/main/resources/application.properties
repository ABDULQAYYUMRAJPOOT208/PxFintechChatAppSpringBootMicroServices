# ===================================
# Application Name
# ===================================
spring.application.name=notification-service
server.port=8086
server.servlet.context-path=/api/v1

# ===================================
# MongoDB Configuration
# ===================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=notificationdb
spring.data.mongodb.auto-index-creation=true

# ===================================
# Valkey Configuration (Redis Compatible)
# ===================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000  # 1 hour for templates

# ===================================
# Kafka Configuration
# ===================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Topics
kafka.topic.notifications=notification-requests
kafka.topic.delivery-status=notification-delivery-status

# ===================================
# WebSocket Configuration
# ===================================
websocket.endpoint=/ws/notifications
websocket.allowed-origins=http://localhost:3000,http://localhost:8080

# ===================================
# Twilio SMS Configuration
# ===================================
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}
twilio.enabled=true

# ===================================
# SendGrid Email Configuration
# ===================================
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@fintech.com}
sendgrid.from-name=Fintech App
sendgrid.enabled=true

# ===================================
# Firebase Configuration
# ===================================
firebase.config-file=classpath:firebase/service-account.json
firebase.database-url=https://your-project.firebaseio.com
firebase.enabled=true

# ===================================
# Notification Settings
# ===================================
notification.default-channel=PUSH
notification.retry.max-attempts=3
notification.retry.delay=1000
notification.rate-limit.per-user=100
notification.rate-limit.duration=3600
notification.template.cache-enabled=true

# ===================================
# Service URLs
# ===================================
service.user.url=http://localhost:8081/api/v1

# ===================================
# Logging
# ===================================
logging.level.com.fintech.notificationservice=DEBUG
logging.level.com.twilio=INFO
logging.level.com.sendgrid=INFO