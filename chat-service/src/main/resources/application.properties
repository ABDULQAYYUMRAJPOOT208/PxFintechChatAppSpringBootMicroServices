spring.application.name=chat-service
server.port=8083
server.servlet.context-path=/api/v1


# websocket
websocket.endpoint=/ws/chat
websocket.allowed-origins=http://localhost:3000,http://localhost:8080
websocket.broker.destination-prefixes=/topic,/queue
websocket.application.destination-prefixes=/app
websocket.user-destination-prefix=/user
websocket.simple-broker.relay-host=localhost
websocket.simple-broker.relay-port=61613


# Cassandra config

spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.keyspace-name=fintech_chat
spring.cassandra.schema-action=CREATE_IF_NOT_EXISTS
spring.cassandra.request.timeout=10s
spring.cassandra.connection.connect-timeout=10s
spring.cassandra.connection.init-query-timeout=10s


# Valkey

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0


# Kafka

spring.kafka.bootstrap-server=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=chat-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Topics
kafka.topic.messages=chat-messages
kafka.topic.delivery=chat-delivery
kafka.topic.typing=chat-typing

jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2023}
jwt.expiration=900000
auth.service.url=http://localhost:8082/api/v1

chat.message.max-length=5000
chat.message.history-days=30
chat.typing.timeout=3000
chat.delivery.timeout=5000

logging.level.com.fintech.chatservice=DEBUG
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.security=INFO




