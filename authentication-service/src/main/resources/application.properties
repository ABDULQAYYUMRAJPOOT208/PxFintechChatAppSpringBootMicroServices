# ===================================
# Application Name
# ===================================
spring.application.name=authentication-service
server.port=8082
server.servlet.context-path=/api/v1

# ===================================
# Database Configuration
# ===================================
spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# Flyway Migration
# ===================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================================
# Valkey Configuration (Redis Compatible)
# ===================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ===================================
# JWT Configuration
# ===================================
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTTokenGeneration2024WithExtraLengthForSecurity}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
jwt.issuer=fintech-auth-service
jwt.audience=fintech-services


# ===================================
# Eureka Discovery
# ===================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false
eureka.instance.prefer-ip-address=true

# ===================================
# Logging
# ===================================
logging.level.com.fintech.authservice=DEBUG
logging.level.org.springframework.security=INFO


# Add to existing application.properties

# OAuth2 Server Settings
oauth2.authorization-server.issuer=http://localhost:8082
oauth2.authorization-server.redirect-uri=http://localhost:3000/callback

# OAuth2 Client Registrations (for social login)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8082/login/oauth2/code/google

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri=http://localhost:8082/login/oauth2/code/facebook

# OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v12.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v12.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email



# Add to existing application.properties

# Service Token Configuration
jwt.service-token-expiration=3600
service.token.allowed-issuers=user-service,chat-service,payment-service,wallet-service
service.token.secret=${SERVICE_TOKEN_SECRET:serviceSecretKeyForInternalCommunication}

# Service Rate Limiting
service.rate-limit.default=1000
service.rate-limit.user-service=2000
service.rate-limit.chat-service=5000
service.rate-limit.payment-service=500


