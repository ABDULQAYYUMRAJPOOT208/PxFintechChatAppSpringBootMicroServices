# ===================================
# Application Name
# ===================================
spring.application.name=payment-service
server.port=8085
server.servlet.context-path=/api/v1

# ===================================
# Database Configuration
# ===================================
spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===================================
# Flyway Migration
# ===================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================================
# Valkey Configuration (Redis Compatible)
# ===================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ===================================
# Kafka Configuration
# ===================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.enable-idempotence=true

spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Topics
kafka.topic.payments=payment-transactions
kafka.topic.settlements=payment-settlements
kafka.topic.fraud-alerts=fraud-alerts

# ===================================
# Stripe Configuration
# ===================================
stripe.api-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.public-key=${STRIPE_PUBLIC_KEY:pk_test_placeholder}

# ===================================
# Payment Settings
# ===================================
payment.currency=USD
payment.min-amount=0.50
payment.max-amount=10000.00
payment.idempotency.ttl=86400  # 24 hours
payment.settlement.cron=0 0 2 * * ?  # 2 AM daily
payment.fraud.enabled=true

# ===================================
# Service URLs
# ===================================
service.wallet.url=http://localhost:8084/api/v1
service.user.url=http://localhost:8081/api/v1
service.notification.url=http://localhost:8086/api/v1

# ===================================
# Logging
# ===================================
logging.level.com.fintech.paymentservice=DEBUG
logging.level.com.stripe=INFO