# ===================================
# Application Name
# ===================================
spring.application.name=wallet-service
server.port=8084
server.servlet.context-path=/api/v1

# ===================================
# Database Configuration - Sharded
# ===================================
# Shard 0
shard0.datasource.url=jdbc:postgresql://localhost:5432/walletdb0
shard0.datasource.username=postgres
shard0.datasource.password=postgres

# Shard 1
shard1.datasource.url=jdbc:postgresql://localhost:5432/walletdb1
shard1.datasource.username=postgres
shard1.datasource.password=postgres

# Shard 2
shard2.datasource.url=jdbc:postgresql://localhost:5432/walletdb2
shard2.datasource.username=postgres
shard2.datasource.password=postgres

# Shard 3
shard3.datasource.url=jdbc:postgresql://localhost:5432/walletdb3
shard3.datasource.username=postgres
shard3.datasource.password=postgres

# Sharding Configuration
sharding.number-of-shards=4
sharding.virtual-nodes=100

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===================================
# Flyway Migration
# ===================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================================
# Valkey Configuration (Redis Compatible)
# ===================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=60000  # 1 minute for balances
spring.cache.redis.cache-null-values=false

# ===================================
# Kafka Configuration
# ===================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.enable-idempotence=true

spring.kafka.consumer.group-id=wallet-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Topics
kafka.topic.wallet-events=wallet-events
kafka.topic.balance-changes=balance-changes
kafka.topic.audit-logs=wallet-audit

# ===================================
# Wallet Settings
# ===================================
wallet.default-currency=USD
wallet.default-daily-limit=1000
wallet.default-monthly-limit=10000
wallet.min-balance=0
wallet.max-balance=1000000
wallet.transaction.idempotency-ttl=86400

# ===================================
# Service URLs
# ===================================
service.user.url=http://localhost:8081/api/v1
service.notification.url=http://localhost:8086/api/v1

# ===================================
# Locking Configuration
# ===================================
wallet.lock.timeout=5000
wallet.lock.retry-attempts=3
wallet.lock.retry-delay=100

# ===================================
# Logging
# ===================================
logging.level.com.fintech.walletservice=DEBUG
logging.level.org.springframework.jdbc=INFO